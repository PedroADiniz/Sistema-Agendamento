; OPcache — cacheia o bytecode PHP em memória.
; Ganho grande no Docker/Windows, onde ler os arquivos do bind mount é lento.
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
; Em dev mantemos a revalidação por timestamp (revalidate_freq=0 = checa sempre),
; assim alterações no código são refletidas sem perder o cache de bytecode.
opcache.validate_timestamps=1
opcache.revalidate_freq=0
; Cache de realpath maior reduz o custo de resolver caminhos no bind mount.
realpath_cache_size=4096K
realpath_cache_ttl=600
