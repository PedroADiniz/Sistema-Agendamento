services:
  # ----------------------------------------------------------------------
  # Banco de dados MySQL 8
  # ----------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: agendamento_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-agendamento}
      MYSQL_USER: ${DB_USERNAME:-agendamento}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - agendamento

  # ----------------------------------------------------------------------
  # PHP-FPM 8.2 (executa o Laravel)
  # ----------------------------------------------------------------------
  php:
    build:
      context: ./docker/php
    container_name: agendamento_php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      # vendor/ em volume nativo da VM Linux (NÃO no bind mount do Windows).
      # Ler os ~12k arquivos do vendor pelo bind mount é o que deixava as
      # requisições lentas; no volume nativo o I/O é muito mais rápido.
      - vendor_data:/var/www/html/vendor
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-agendamento}
      DB_USERNAME: ${DB_USERNAME:-agendamento}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - agendamento

  # ----------------------------------------------------------------------
  # Nginx (expõe a API REST do Laravel na porta 8000)
  # ----------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: agendamento_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - agendamento

  # ----------------------------------------------------------------------
  # Node + Vite (servidor de desenvolvimento do frontend Vue na porta 5173)
  # ----------------------------------------------------------------------
  node:
    image: node:20-alpine
    container_name: agendamento_node
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      # URL da API que o frontend consome (browser -> nginx)
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    networks:
      - agendamento

networks:
  agendamento:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  vendor_data:
    driver: local
